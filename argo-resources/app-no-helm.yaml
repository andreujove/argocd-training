apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/andreujove/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook
  syncPolicy:
    automated: # This section enables auto-sync
      prune: true # Deletes resources from K8s if they are removed from Git
      selfHeal: true # Overwrites manual changes in the cluster
    syncOptions:
      - CreateNamespace=true  # <--- This is the magic line